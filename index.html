<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG do Código: Mestre do Flexbox</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Bibliotecas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Ícone (Lucide)
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const MISSIONS = [
            {
                id: 1,
                world: "Mundo 1 — O Reino do HTML",
                title: "Criar seu primeiro artefato HTML",
                explanation: "HTML é o esqueleto de um site. Sem ele, não temos nada!",
                visual: "🦴 HTML é como a estrutura de uma casa.",
                codeExample: "<html>\n  <body>\n    Olá aventureiro\n  </body>\n</html>",
                objective: "Digite a estrutura básica com 'Olá aventureiro' no body.",
                rewardXP: 50,
                validation: (code) => {
                    const clean = code.toLowerCase().replace(/\s/g, '');
                    return clean.includes('<html>') && clean.includes('<body>') && clean.includes('oláaventureiro');
                }
            },
            {
                id: 2,
                world: "Mundo 1 — O Reino do HTML",
                title: "O Título do Herói",
                explanation: "Títulos (h1) dão nome às coisas.",
                visual: "📜 O <h1> é como o nome de um capítulo.",
                codeExample: "<h1>Meu Nome</h1>",
                objective: "Adicione um título <h1> com seu nome.",
                rewardXP: 50,
                validation: (code) => code.toLowerCase().includes('<h1') && code.toLowerCase().includes('</h1>')
            }
        ];

        function App() {
            const [gameStarted, setGameStarted] = useState(false);
            const [level, setLevel] = useState(1);
            const [xp, setXp] = useState(0);
            const [currentMissionIndex, setCurrentMissionIndex] = useState(0);
            const [missionAccepted, setMissionAccepted] = useState(false);
            const [code, setCode] = useState("");
            const [showSuccess, setShowSuccess] = useState(false);

            const currentMission = MISSIONS[currentMissionIndex];

            useEffect(() => {
                if (xp >= 100) { setLevel(l => l + 1); setXp(x => x - 100); }
            }, [xp]);

            const handleSubmit = () => {
                if (currentMission.validation(code)) {
                    setXp(x => x + currentMission.rewardXP);
                    setShowSuccess(true);
                    setTimeout(() => {
                        setShowSuccess(false);
                        setMissionAccepted(false);
                        if (currentMissionIndex < MISSIONS.length - 1) setCurrentMissionIndex(i => i + 1);
                    }, 2000);
                } else { alert("Código incorreto, tente novamente!"); }
            };

            if (!gameStarted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="p-6 bg-emerald-500/10 rounded-full border border-emerald-500/20 mb-8">
                            <Icon name="sword" className="w-16 h-16 text-emerald-400" />
                        </div>
                        <h1 className="text-5xl font-bold text-white italic font-serif mb-4">RPG DO CÓDIGO</h1>
                        <p className="text-xl text-slate-400 mb-8">Sua jornada para se tornar Mestre começa aqui.</p>
                        <button onClick={() => setGameStarted(true)} className="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-all">
                            INICIAR AVENTURA
                        </button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="border-b border-slate-800 bg-slate-900/50 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <Icon name="shield" className="text-emerald-400 w-8 h-8" />
                                <div>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase">STATUS</p>
                                    <p className="text-sm font-bold">Nível: {level} | XP: {xp}/100</p>
                                </div>
                            </div>
                            <div className="w-32 h-2 bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 transition-all" style={{width: `${xp}%`}}></div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-6xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-6">
                            {!missionAccepted ? (
                                <div className="bg-slate-800/50 rounded-2xl p-8 border border-slate-700">
                                    <p className="text-emerald-400 text-xs font-bold mb-2 uppercase tracking-widest">{currentMission.world}</p>
                                    <h2 className="text-2xl font-bold text-white mb-6">MISSÃO {currentMission.id}: {currentMission.title}</h2>
                                    <div className="space-y-4 mb-8">
                                        <p className="text-slate-300">{currentMission.explanation}</p>
                                        <div className="p-4 bg-slate-900 rounded-xl border border-slate-700 text-emerald-300 italic text-sm">{currentMission.visual}</div>
                                        <pre className="p-4 bg-black/40 rounded-xl border border-slate-700 font-mono text-xs text-blue-300">{currentMission.codeExample}</pre>
                                    </div>
                                    <button onClick={() => setMissionAccepted(true)} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold">ACEITAR MISSÃO</button>
                                </div>
                            ) : (
                                <div className="bg-slate-800/50 rounded-2xl p-8 border border-emerald-500/30">
                                    <h2 className="text-xl font-bold text-white mb-4">Objetivo: {currentMission.objective}</h2>
                                    <textarea value={code} onChange={(e) => setCode(e.target.value)} className="w-full h-48 bg-black/40 border border-slate-700 rounded-xl p-4 font-mono text-emerald-400 outline-none mb-4" placeholder="Digite seu código..."></textarea>
                                    <button onClick={handleSubmit} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold">CONCLUIR MISSÃO</button>
                                </div>
                            )}
                        </div>
                        <div className="bg-white rounded-2xl border border-slate-800 overflow-hidden min-h-[300px] text-black p-6">
                            <div dangerouslySetInnerHTML={{ __html: code }} />
                        </div>
                    </main>

                    {showSuccess && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6">
                            <div className="bg-slate-800 border-2 border-emerald-500 rounded-3xl p-10 text-center animate-bounce-slow">
                                <Icon name="trophy" className="w-16 h-16 text-emerald-400 mx-auto mb-4" />
                                <h2 className="text-3xl font-bold text-white italic">MISSÃO CUMPRIDA!</h2>
                                <p className="text-emerald-400 font-bold">XP ADQUIRIDO!</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
